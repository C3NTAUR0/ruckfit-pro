<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0E14" />
  <title>RuckFit Pro — Rugby Performance Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%23B5FF3C' d='M16 4c6 0 12 4 12 12s-6 12-12 12S4 22 4 16 10 4 16 4Zm-4 6 8 12-3-1-3 3-2-14Z'/%3E%3C/svg%3E" />
</head>
<body>
  <!-- ONBOARDING OVERLAY -->
  <div class="onboarding" id="onboarding" hidden>
    <div class="onboarding__panel">
      <div class="onboarding__brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="36" height="36">
            <defs>
              <linearGradient id="lg-on" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#B5FF3C"/>
                <stop offset="1" stop-color="#14E48A"/>
              </linearGradient>
            </defs>
            <path d="M20 3c9.4 0 17 7.6 17 17S29.4 37 20 37 3 29.4 3 20 10.6 3 20 3Z" fill="none" stroke="url(#lg-on)" stroke-width="2.2"/>
            <path d="M13 11l11 16-3.6-1.2L17 30 13 11Z" fill="url(#lg-on)"/>
          </svg>
        </span>
        <div>
          <h1 class="onboarding__title">RuckFit <span>Pro</span></h1>
          <p class="onboarding__sub">Elite rugby performance — built for the pitch.</p>
        </div>
      </div>

      <div class="stepper" id="stepper"></div>
      <form class="onboarding__form" id="onboardingForm" novalidate></form>

      <div class="onboarding__actions">
        <button class="btn btn--ghost" id="onbBack" type="button">Back</button>
        <div class="onb-spacer"></div>
        <button class="btn btn--ghost" id="onbSkip" type="button">Use demo profile</button>
        <button class="btn btn--primary" id="onbNext" type="button">Continue</button>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div class="app" id="app" hidden>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sidebar__brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="30" height="30">
            <defs>
              <linearGradient id="lg-side" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#B5FF3C"/>
                <stop offset="1" stop-color="#14E48A"/>
              </linearGradient>
            </defs>
            <path d="M20 3c9.4 0 17 7.6 17 17S29.4 37 20 37 3 29.4 3 20 10.6 3 20 3Z" fill="none" stroke="url(#lg-side)" stroke-width="2.2"/>
            <path d="M13 11l11 16-3.6-1.2L17 30 13 11Z" fill="url(#lg-side)"/>
          </svg>
        </span>
        <span class="sidebar__name">RuckFit<span>Pro</span></span>
      </div>

      <nav class="sidebar__nav" id="sidebarNav" aria-label="App sections"></nav>

      <div class="sidebar__foot">
        <div class="phase-pill" id="phasePill"></div>
        <div class="sidebar__hint">Built for forwards & backs.</div>
      </div>
    </aside>

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="iconbtn topbar__menu" id="menuToggle" aria-label="Toggle navigation">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>

      <div class="topbar__title">
        <div class="topbar__crumb" id="crumb">Dashboard</div>
        <div class="topbar__date" id="topDate"></div>
      </div>

      <div class="topbar__search">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="globalSearch" type="search" placeholder="Search exercises, sessions, drills…" />
        <span class="kbd">⌘K</span>
      </div>

      <div class="topbar__status" id="topStatus"></div>

      <button class="iconbtn topbar__bell" id="notifBtn" aria-label="Notifications">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 16V11a6 6 0 1 1 12 0v5l1.5 2H4.5L6 16Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/><path d="M10 21a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        <span class="dot" id="notifDot"></span>
      </button>

      <button class="iconbtn" id="themeToggle" aria-label="Toggle theme">
        <svg id="iconMoon" viewBox="0 0 24 24" width="18" height="18"><path d="M20 14.5A8 8 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" fill="currentColor"/></svg>
        <svg id="iconSun" viewBox="0 0 24 24" width="18" height="18" hidden><circle cx="12" cy="12" r="4" fill="currentColor"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.5 4.5l2 2M17.5 17.5l2 2M4.5 19.5l2-2M17.5 6.5l2-2"/></g></svg>
      </button>

      <button class="topbar__profile" id="profileBtn" aria-label="Athlete profile">
        <span class="avatar" id="avatar"></span>
        <span class="topbar__profile-meta">
          <span id="profileName">Athlete</span>
          <span id="profilePos" class="muted"></span>
        </span>
      </button>
    </header>

    <!-- NOTIF PANEL -->
    <div class="popover popover--notif" id="notifPanel" hidden>
      <div class="popover__head"><strong>Notifications</strong><button class="iconbtn iconbtn--sm" data-close-notif aria-label="Close">✕</button></div>
      <div class="popover__body" id="notifList"></div>
    </div>

    <!-- MAIN -->
    <main class="main" id="main">
      <section class="view" id="view"></section>
    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="bottomnav" id="bottomnav" aria-label="Mobile nav"></nav>

    <!-- TOAST -->
    <div class="toast" id="toast" hidden></div>

    <!-- DRAWER / MODAL ROOT -->
    <div class="modal" id="modal" hidden>
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal__panel" id="modalPanel" role="dialog" aria-modal="true"></div>
    </div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/charts.js"></script>
  <script src="assets/views.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
